<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>圖文分離題庫測試</title>
  <style>
    :root { font-family: system-ui, -apple-system, "PingFang TC", sans-serif; color: #17243a; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #edf2f7; }
    header { background: #fff; border-bottom: 1px solid #d8e0e9; padding: 22px clamp(18px, 4vw, 48px); }
    h1 { margin: 0 0 6px; font-size: 27px; letter-spacing: 0; }
    header p { margin: 0; color: #617187; }
    main { width: min(1100px, calc(100% - 28px)); margin: 22px auto 48px; }
    nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    button { font: inherit; cursor: pointer; }
    nav button { padding: 9px 14px; border: 1px solid #aab8c8; background: #fff; color: #24364d; }
    nav button[aria-selected="true"] { color: #fff; background: #176b52; border-color: #176b52; }
    article { background: #fff; border: 1px solid #d8e0e9; padding: clamp(18px, 4vw, 34px); }
    article.group-mode {
      height: calc(100dvh - 190px);
      min-height: 480px;
      display: grid;
      grid-template-rows: minmax(230px, 52%) minmax(0, 48%);
      overflow: hidden;
      padding: 0;
    }
    .meta { color: #627188; font-size: 14px; margin-bottom: 14px; }
    .stem { white-space: pre-wrap; line-height: 1.8; font-size: 18px; }
    .figure { width: min(180px, 45vw); margin: 16px 0; border: 1px solid #d8e0e9; }
    .figure img { display: block; width: 100%; height: auto; }
    .table-wrap { overflow-x: auto; margin: 18px 0; }
    .shared-material {
      position: sticky;
      top: 0;
      z-index: 2;
      overflow: auto;
      background: #fff;
      border-bottom: 2px solid #9facba;
      padding: 18px 22px;
    }
    .shared-material h2 { margin: 0; font-size: 18px; }
    .shared-material .table-wrap { margin-bottom: 0; }
    .quantity-table { min-width: 720px; font-size: 14px; }
    .quantity-table th, .quantity-table td { padding: 6px 8px; text-align: center; }
    .group-question-pane { min-height: 0; overflow-y: auto; padding: 18px 22px 28px; }
    .group-controls { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0 0 18px; }
    .group-controls button { border: 1px solid #aab8c8; background: #fff; padding: 8px 12px; color: #24364d; }
    .group-controls button:disabled { opacity: .45; cursor: default; }
    .group-progress { color: #627188; font-size: 14px; }
    table { width: 100%; border-collapse: collapse; min-width: 680px; }
    th, td { border: 1px solid #8795a8; padding: 9px 10px; text-align: left; vertical-align: top; }
    th { background: #e9f2ee; }
    fieldset { border: 0; padding: 0; margin: 20px 0 0; display: grid; gap: 9px; }
    label { display: flex; gap: 10px; align-items: flex-start; border: 1px solid #cbd5df; padding: 12px; cursor: pointer; }
    label:has(input:checked) { border-color: #176b52; background: #edf7f3; }
    .empty, .error { color: #8a3842; }
    @media (max-width: 640px) {
      h1 { font-size: 22px; }
      .stem { font-size: 16px; }
      nav { display: grid; grid-template-columns: repeat(2, 1fr); }
      article.group-mode {
        height: calc(100dvh - 210px);
        grid-template-rows: minmax(210px, 48%) minmax(0, 52%);
      }
      .shared-material, .group-question-pane { padding-left: 14px; padding-right: 14px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>圖文分離題庫測試</h1>
    <p>單題圖文分離，以及 14-15 題組共用表格</p>
  </header>
  <main>
    <nav id="question-nav" aria-label="測試題目"></nav>
    <article id="question"><p class="empty">載入中...</p></article>
  </main>
  <script>
    const nav = document.querySelector('#question-nav');
    const panel = document.querySelector('#question');
    let items = [];
    let activeItem = 0;
    let activeGroupQuestion = 0;
    const answers = {};

    function renderChoices(question) {
      return Object.entries(question.選項).map(([key, value]) => `
        <label>
          <input type="radio" name="answer-${question.題號}" value="${key}"
            ${answers[question.題號] === key ? 'checked' : ''}>
          <span><strong>${key}</strong>　${value}</span>
        </label>
      `).join('');
    }

    function renderSingle(question) {
      panel.classList.remove('group-mode');
      const image = question.附圖
        ? `<figure class="figure"><img src="${question.附圖}" alt="第 ${question.題號} 題附圖"></figure>`
        : '';
      panel.innerHTML = `
        <div class="meta">${question.課次} · 第 ${question.題號} 題 · ${question.題型}</div>
        <div class="stem">${question.題幹文字}</div>
        ${image}
        <fieldset aria-label="答案選項">${renderChoices(question)}</fieldset>
      `;
    }

    function renderSharedMaterial(shared) {
      if (shared.類型 === 'table') {
        return `<div class="table-wrap">${shared.內容.HTML}</div>`;
      }
      if (shared.類型 === 'image') {
        return `<figure class="figure"><img src="${shared.內容}" alt="題組共用附圖"></figure>`;
      }
      return '';
    }

    function renderGroup(group) {
      const question = group.題目[activeGroupQuestion];
      panel.classList.add('group-mode');
      panel.innerHTML = `
        <section class="shared-material">
          <h2>第 ${group.題號範圍[0]}-${group.題號範圍[1]} 題共用資料</h2>
          ${renderSharedMaterial(group.共用資料)}
        </section>
        <section class="group-question-pane">
          <div class="group-controls">
            <button type="button" data-group-step="-1" ${activeGroupQuestion === 0 ? 'disabled' : ''}>← 上一題</button>
            <span class="group-progress">第 ${activeGroupQuestion + 1}／${group.題目.length} 題</span>
            <button type="button" data-group-step="1" ${activeGroupQuestion === group.題目.length - 1 ? 'disabled' : ''}>下一題 →</button>
          </div>
          <div class="meta">${group.課次} · ${group.題組ID} · 第 ${question.題號} 題</div>
          <div class="stem">${question.題幹文字}</div>
          <fieldset aria-label="答案選項">${renderChoices(question)}</fieldset>
        </section>
      `;
    }

    function showItem(index) {
      activeItem = index;
      const item = items[index];
      [...nav.querySelectorAll('button')].forEach((button, buttonIndex) => {
        button.setAttribute('aria-selected', String(buttonIndex === index));
      });
      if (item.kind === 'group') {
        activeGroupQuestion = 0;
        renderGroup(item.data);
      } else {
        renderSingle(item.data);
      }
    }

    fetch('../data/mixed-content-test/L03/questions.json')
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((data) => {
        items = [
          ...data.單題.map((question) => ({ kind: 'single', data: question })),
          ...data.題組.map((group) => ({ kind: 'group', data: group })),
        ];
        nav.innerHTML = items.map((item, index) => `
          <button type="button" data-index="${index}" aria-selected="${index === 0}">
            ${item.kind === 'group'
              ? `第 ${item.data.題號範圍[0]}-${item.data.題號範圍[1]} 題組`
              : `第 ${item.data.題號} 題`}
          </button>
        `).join('');
        nav.addEventListener('click', (event) => {
          const button = event.target.closest('button[data-index]');
          if (button) showItem(Number(button.dataset.index));
        });
        panel.addEventListener('click', (event) => {
          const button = event.target.closest('button[data-group-step]');
          if (!button) return;
          const group = items[activeItem].data;
          activeGroupQuestion += Number(button.dataset.groupStep);
          renderGroup(group);
        });
        panel.addEventListener('change', (event) => {
          if (event.target.matches('input[type="radio"]')) {
            const questionNumber = event.target.name.replace('answer-', '');
            answers[questionNumber] = event.target.value;
          }
        });
        showItem(0);
      })
      .catch((error) => {
        panel.innerHTML = `<p class="error">題庫載入失敗：${error.message}</p>`;
      });
  </script>
</body>
</html>
